<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StyleHub - Clothing Store</title>
<style>
body{margin:0;font-family:Arial;background:#f4f4f4}
header{background:#111;color:#fff;padding:15px;text-align:center}
nav{display:flex;justify-content:center;gap:20px;background:#222;padding:10px}
nav a{color:#fff;text-decoration:none;font-weight:bold}
nav a:hover{color:#f0a500}
.hero{background:url('https://picsum.photos/1200/400') center/cover;height:300px;
display:flex;align-items:center;justify-content:center;color:#fff;font-size:32px}
.container{padding:20px}
.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px}
.card{background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 4px 8px rgba(0,0,0,0.1);
transition:0.3s}
.card:hover{transform:translateY(-5px)}
.card img{width:100%;height:200px;object-fit:cover}
.card h3{margin:10px}
.card p{margin:10px;color:#555}
.btn{display:block;margin:10px;padding:10px;background:#111;color:#fff;
text-align:center;border-radius:5px;text-decoration:none}
.btn:hover{background:#f0a500}
footer{background:#111;color:#fff;text-align:center;padding:10px;margin-top:20px}
</style>
</head>

<body>

<header>
<h1>StyleHub</h1>
<p>Your Fashion Destination</p>
</header>

<nav>
<a href="#">Home</a>
<a href="#">Shop</a>
<a href="#">Men</a>
<a href="#">Women</a>
<a href="#">Contact</a>
</nav>

<div class="hero">
Welcome to StyleHub
</div>

<div class="container">
<h2>Featured Products</h2>
<div class="products">

<div class="card">
<img src="https://picsum.photos/300/200?1">
<h3>Casual T-Shirt</h3>
<p>$15</p>
<a href="#" class="btn">Buy Now</a>
</div>

<div class="card">
<img src="https://picsum.photos/300/200?2">
<h3>Denim Jacket</h3>
<p>$40</p>
<a href="#" class="btn">Buy Now</a>
</div>

<div class="card">
<img src="https://picsum.photos/300/200?3">
<h3>Summer Dress</h3>
<p>$30</p>
<a href="#" class="btn">Buy Now</a>
</div>

<div class="card">
<img src="https://picsum.photos/300/200?4">
<h3>Sneakers</h3>
<p>$50</p>
<a href="#" class="btn">Buy Now</a>
</div>

</div>
</div>

<footer>
<p>© 2026 StyleHub | All Rights Reserved</p>
</footer>

</body>
</html>
